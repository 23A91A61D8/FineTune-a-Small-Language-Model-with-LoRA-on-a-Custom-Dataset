version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml
#
#  Services
#  ────────
#  train    → runs generate_dataset.py then train.py
#  predict  → runs predict.py (depends on train completing first)
#  full     → runs the complete pipeline (dataset → train → predict)
#
#  Usage
#  ─────
#  Full pipeline : docker compose run --rm full
#  Train only    : docker compose run --rm train
#  Predict only  : docker compose run --rm predict
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  build: .
  env_file: .env
  volumes:
    # Persist generated artefacts on the host
    - ./output:/app/output
    - ./lora_adapter:/app/lora_adapter
    - ./dataset:/app/dataset
    # Cache HuggingFace model weights so they are not re-downloaded each run
    - huggingface_cache:/root/.cache/huggingface
  # Uncomment the deploy block below if you have an NVIDIA GPU:
  # deploy:
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: 1
  #           capabilities: [gpu]

services:

  # ── Step 1: generate dataset + train ───────────────────────────────────────
  train:
    <<: *common
    container_name: lora_train
    command: >
      bash -c "
        echo '=== Generating dataset ===' &&
        python generate_dataset.py &&
        echo '=== Starting training ===' &&
        python train.py &&
        echo '=== Training complete ==='
      "

  # ── Step 2: inference & comparison ─────────────────────────────────────────
  predict:
    <<: *common
    container_name: lora_predict
    command: >
      bash -c "
        echo '=== Running inference ===' &&
        python predict.py &&
        echo '=== Inference complete ==='
      "

  # ── Full pipeline (train → predict) ────────────────────────────────────────
  full:
    <<: *common
    container_name: lora_full
    command: >
      bash -c "
        echo '=== Step 1/3  Generate dataset ===' &&
        python generate_dataset.py &&
        echo '=== Step 2/3  Fine-tune model ===' &&
        python train.py &&
        echo '=== Step 3/3  Run inference ===' &&
        python predict.py &&
        echo '=== All done! Check output/ folder ==='
      "

volumes:
  huggingface_cache:
